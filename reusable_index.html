<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricing Cards</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        padding: 24px;
        color: #0f172a;
      }

      .cards {
        max-width: 980px;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: stretch;
        justify-content: center;
      }

      .pricing {
        width: 300px;
        background-color: #fff;
        box-shadow: 0 0 10px #ccc;
        padding: 16px;
        border-radius: 10px;
        text-align: left;
        display: flex;
        flex-direction: column;
      }

      .title {
        font-size: 22px;
        font-weight: 700;
        margin: 0 0 8px;
      }

      .price {
        font-size: 18px;
        color: green;
        font-weight: 600;
        margin: 0 0 12px;
      }

      .features {
        list-style: none;
        padding-left: 0;
        margin: 0 0 16px;
        flex: 1;
      }

      .features li {
        padding: 6px 0;
        border-bottom: 1px solid #eee;
      }

      .features li:last-child {
        border-bottom: none;
      }

      .btn {
        width: 100%;
        background: #0b5cff;
        color: #fff;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        text-align: center;
      }

      .btn:hover {
        background: #094bb3;
      }

      .btn:focus-visible {
        outline: 3px solid rgba(11, 92, 255, 0.3);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div class="cards" id="cards"></div>

    <script src="./js/script.js"></script>
  </body>
</html>
