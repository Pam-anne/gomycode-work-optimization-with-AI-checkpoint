<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pricing</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .pricing {
      width: 300px;
      background-color: #fff;
      box-shadow: 0 0 10px #ccc;
      padding: 16px;
      border-radius: 10px;
      text-align: left;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .price {
      font-size: 18px;
      color: green;
      font-weight: 600;
      margin: 0 0 12px;
    }

    .features {
      list-style: none;
      padding-left: 0;
      margin: 0 0 16px;
    }

    .features li {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }

    .features li:last-child {
      border-bottom: none;
    }

    .btn {
      width: 100%;
      background: #0b5cff;
      color: #fff;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
    }

    .btn:hover {
      background: #094bb3;
    }

    .btn:focus-visible {
      outline: 3px solid rgba(11, 92, 255, 0.3);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="pricing">
    <h2 class="title">Basic Plan</h2>
    <p class="price">$9.99 /month</p>

    <ul class="features">
      <li>1 GB Storage</li>
      <li>Basic Support</li>
      <li>All Core Features</li>
    </ul>

    <button class="btn" type="button">Start Trial</button>
  </div>
</body>
</html>
