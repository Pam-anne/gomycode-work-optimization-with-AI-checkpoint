<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pricing Cards</title>
  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color: #0b1220;
      background: #f6f7fb;
      padding: 24px;
      box-sizing: border-box;

      /* Perfect center: the cards wrapper sits in the middle of the viewport. */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cards {
      width: 100%;
      max-width: 1040px;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: stretch;
      justify-content: center;
    }

    .pricing {
      flex: 1 1 280px;
      max-width: 320px;
      width: 100%;

      background: #ffffff;
      border: 1px solid #e7eaf3;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      padding: 22px;
      border-radius: 16px;
      text-align: left;
      display: flex;
      flex-direction: column;

      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .pricing:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.10);
      border-color: #d9deee;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 8px;
    }

    .price {
      margin: 0 0 16px;
      font-weight: 900;
      letter-spacing: -0.01em;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .price-main {
      font-size: 28px;
      color: #0b1220;
      line-height: 1;
    }

    .price-sub {
      font-size: 14px;
      font-weight: 700;
      color: #6b7280;
      line-height: 1;
    }

    .features {
      list-style: none;
      padding-left: 0;
      margin: 0 0 18px;
      flex: 1;
    }

    .features li {
      padding: 8px 0;
      border-bottom: 1px solid #eef0f6;
      line-height: 1.25;
      color: #374151;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .features li:last-child {
      border-bottom: none;
    }

    .features li::before {
      content: "";
      margin-top: 6px;
      width: 9px;
      height: 4px;
      border-left: 2px solid #635bff;
      border-bottom: 2px solid #635bff;
      transform: rotate(-45deg);
      flex: 0 0 9px;
    }

    .btn {
      width: 100%;
      background: #635bff;
      color: #fff;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 10px 22px rgba(99, 91, 255, 0.22);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .btn:hover {
      background: #524bff;
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(99, 91, 255, 0.28);
    }

    .btn:focus-visible {
      outline: 3px solid rgba(99, 91, 255, 0.35);
      outline-offset: 3px;
    }

    .btn:active {
      transform: translateY(0px) scale(0.99);
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }
      .cards {
        gap: 14px;
      }
      .pricing {
        max-width: none;
        padding: 16px;
      }
      .price-main {
        font-size: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .pricing,
      .btn {
        transition: none;
      }
      .pricing:hover {
        transform: none;
      }
      .btn:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="cards" id="cards"></div>

  <script>
    /**
     * Creates a pricing card element (plain JS, no frameworks).
     * @param {Object} options
     * @param {string} options.title
     * @param {string} options.price
     * @param {string[]} options.features
     * @param {string} [options.buttonText]
     * @param {() => void} [options.onButtonClick]
     * @returns {HTMLDivElement}
     */
    function createPricingCard(options) {
      const {
        title,
        price,
        features,
        buttonText = "Start Trial",
        onButtonClick
      } = options;

      const card = document.createElement("div");
      card.className = "pricing";

      const titleEl = document.createElement("h2");
      titleEl.className = "title";
      titleEl.textContent = title;

      const priceEl = document.createElement("p");
      priceEl.className = "price";
      const priceStr = String(price ?? "");
      // If input looks like "$9.99 /month", split into a bold main value + smaller subtext.
      const priceSplit = priceStr.split(" /");
      if (priceSplit.length === 2) {
        const [main, sub] = priceSplit;
        const mainEl = document.createElement("span");
        mainEl.className = "price-main";
        mainEl.textContent = main.trim();

        const subEl = document.createElement("span");
        subEl.className = "price-sub";
        subEl.textContent = `/${sub.trim()}`;

        priceEl.appendChild(mainEl);
        priceEl.appendChild(subEl);
      } else {
        priceEl.textContent = priceStr;
      }

      const listEl = document.createElement("ul");
      listEl.className = "features";

      for (const item of features) {
        const li = document.createElement("li");
        li.textContent = item;
        listEl.appendChild(li);
      }

      const btn = document.createElement("button");
      btn.className = "btn";
      btn.type = "button";
      btn.textContent = buttonText;
      btn.addEventListener("click", () => {
        if (typeof onButtonClick === "function") onButtonClick();
      });

      card.appendChild(titleEl);
      card.appendChild(priceEl);
      card.appendChild(listEl);
      card.appendChild(btn);

      return card;
    }

    // Example usage: render multiple cards on the same page.
    const cardsEl = document.getElementById("cards");

    const pricingData = [
      {
        title: "Basic Plan",
        price: "$9.99 /month",
        features: ["1 GB Storage", "Basic Support", "All Core Features"],
        onButtonClick: () => alert("Starting Basic Trial")
      },
      {
        title: "Pro Plan",
        price: "$19.99 /month",
        features: ["10 GB Storage", "Priority Support", "Advanced Features"],
        buttonText: "Go Pro",
        onButtonClick: () => alert("Starting Pro Trial")
      },
      {
        title: "Team Plan",
        price: "$49.99 /month",
        features: ["Shared Workspace", "Team Analytics", "Dedicated Support"],
        buttonText: "Contact Sales",
        onButtonClick: () => alert("Contacting Sales")
      }
    ];

    for (const data of pricingData) {
      cardsEl.appendChild(createPricingCard(data));
    }
  </script>
</body>
</html>
